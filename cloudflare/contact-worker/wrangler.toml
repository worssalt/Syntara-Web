name = "syntara-contact"
main = "src/index.js"
compatibility_date = "2026-02-24"

[vars]
ALLOWED_ORIGIN = "https://syntara.biz"
CONTACT_FROM = "Web SYNTARA <web@mail.syntara.biz>"
CONTACT_TO = "syntaraweb@gmail.com"

# Configura en Cloudflare dashboard/CLI:
